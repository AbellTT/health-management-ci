name: Day 3 and Day 4 CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate PR and main changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint frontend source
        working-directory: frontend
        run: npm run lint

      - name: Lint backend source
        working-directory: backend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Build frontend production bundle
        working-directory: frontend
        run: CI=false npm run build

      - name: Build backend container image for validation
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: health-management-backend:ci

      - name: Build frontend container image for validation
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: health-management-frontend:ci

  publish:
    name: Publish on main merge
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/health-management-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/health-management-backend:prod

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/health-management-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/health-management-frontend:prod

  deploy:
    name: Trigger cloud deployment
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi
          curl --fail --show-error --silent "$RENDER_DEPLOY_HOOK_URL"
