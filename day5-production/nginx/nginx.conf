events {
  worker_connections 1024;
}

http {
  upstream backend_pool {
    least_conn;
    server backend-a:3007;
    server backend-b:3007;
  }

  upstream frontend_pool {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    location = /nginx_status {
      stub_status;
      access_log off;
    }

    location = /backend-health {
      proxy_pass http://backend_pool/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header X-Upstream-Backend $upstream_addr always;
    }

    location ~ ^/(auth|admin|public|reports|appointments|doctors|patients|nurses|certificates|labtechs|lab|ai)(/|$) {
      proxy_pass http://backend_pool;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header X-Upstream-Backend $upstream_addr always;
    }

    location / {
      proxy_pass http://frontend_pool;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
