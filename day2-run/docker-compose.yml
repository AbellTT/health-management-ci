services:
  frontend:
    image: abeltt/health-management-frontend:day1
    env_file:
      - ./frontend.env
    ports:
      - "3100:80"
    depends_on:
      - backend

  backend:
    image: abeltt/health-management-backend:day1
    env_file:
      - ./backend.env
    ports:
      - "3107:3007"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: shms-postgres-day2
    restart: always
    env_file:
      - ./db.env
    ports:
      - "55432:5432"
    volumes:
      - postgres_data_day2:/var/lib/postgresql/data

volumes:
  postgres_data_day2:
