# Render Blueprint for Day 4 cloud deployment.
# Sync this file from the Render dashboard to create/update the backend,
# frontend, and PostgreSQL resources.

services:
  - type: web
    name: health-management-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "3007"
      - key: DATABASE_URL
        fromDatabase:
          name: health-management-db
          property: connectionString
      - key: PG_SSL
        value: "false"
      - key: KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_MAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat-v3-0324:free

  - type: web
    name: health-management-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && CI=false npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_BASE_URL
        fromService:
          name: health-management-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: health-management-db
    plan: free
    databaseName: healthcare
    user: healthcare_user
